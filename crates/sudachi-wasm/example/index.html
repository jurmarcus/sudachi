<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudachi WASM — Japanese Tokenizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 24px;
      color: #e0e0e0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      background: #1e2a3a;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      padding: 40px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #fff;
    }

    .subtitle {
      color: #7a9ec2;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .badge {
      display: inline-block;
      background: #2d4a6e;
      color: #7ec8e3;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #7a9ec2;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 14px;
      background: #162030;
      border: 1px solid #2d4a6e;
      border-radius: 8px;
      font-size: 20px;
      color: #e0e0e0;
      resize: vertical;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    textarea:focus { outline: none; border-color: #4a90d9; }

    .row {
      display: flex;
      gap: 12px;
      margin: 16px 0;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      background: #4a90d9;
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) { background: #357abd; }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      background: #2d4a6e;
      font-size: 13px;
      padding: 10px 18px;
    }

    .btn-secondary:hover:not(:disabled) { background: #3a5f8a; }

    .status {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 6px;
      margin: 14px 0;
    }

    .status.info    { background: #162d45; color: #7ec8e3; border-left: 3px solid #4a90d9; }
    .status.success { background: #162d1f; color: #7ec89e; border-left: 3px solid #4db86e; }
    .status.error   { background: #2d1616; color: #e37e7e; border-left: 3px solid #d94a4a; }

    .tabs {
      display: flex;
      gap: 4px;
      margin: 24px 0 16px;
      border-bottom: 1px solid #2d4a6e;
    }

    .tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #7a9ec2;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      transition: color 0.2s, background 0.2s;
      border: none;
      background: none;
    }

    .tab.active {
      color: #fff;
      background: #2d4a6e;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* Token table */
    .token-table { width: 100%; border-collapse: collapse; font-size: 14px; }

    .token-table th {
      text-align: left;
      padding: 8px 12px;
      color: #7a9ec2;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #2d4a6e;
    }

    .token-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #1a2535;
      vertical-align: top;
    }

    .surface { font-size: 18px; font-weight: 600; color: #fff; }

    .colocated-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: #2d3d6e;
      color: #7ec8e3;
      margin-left: 6px;
    }

    .bytes { font-size: 11px; color: #7a9ec2; font-family: monospace; }

    /* Compound cards */
    .compound-card {
      background: #162030;
      border: 1px solid #2d4a6e;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .compound-surface { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }

    .components {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .component {
      background: #2d4a6e;
      color: #7ec8e3;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 14px;
    }

    .empty { color: #4a6a8a; font-size: 14px; padding: 16px 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>Sudachi WASM <span class="badge">B+C Search Mode</span></h1>
  <p class="subtitle">Japanese morphological analysis via WebAssembly — powered by sudachi-search</p>

  <label for="dictInput">Dictionary (.dic file)</label>
  <div class="row">
    <input type="file" id="dictInput" accept=".dic" style="color:#e0e0e0; font-size:13px;">
    <span style="color:#7a9ec2; font-size:13px;">or</span>
    <input type="text" id="dictUrl" placeholder="URL to system_full.dic"
      style="flex:1; padding:10px 12px; background:#162030; border:1px solid #2d4a6e; border-radius:8px; color:#e0e0e0; font-size:13px;">
    <button class="btn-secondary" id="loadUrlBtn">Load URL</button>
  </div>

  <div id="status" class="status info">Load a Sudachi dictionary to get started.</div>

  <label for="inputText">Japanese text</label>
  <textarea id="inputText" disabled placeholder="東京都立大学で研究しています">東京都立大学で研究しています</textarea>

  <div class="row">
    <button id="tokenizeBtn" disabled>Tokenize</button>
    <button class="btn-secondary" id="compoundsBtn" disabled>Detect Compounds</button>
  </div>

  <div class="tabs" id="tabs" style="display:none;">
    <button class="tab active" data-panel="tokens">Tokens</button>
    <button class="tab" data-panel="compounds">Compounds</button>
  </div>

  <div id="tokens" class="panel active">
    <table class="token-table">
      <thead>
        <tr>
          <th>Surface</th>
          <th>Bytes</th>
        </tr>
      </thead>
      <tbody id="tokenBody"></tbody>
    </table>
  </div>

  <div id="compounds" class="panel">
    <div id="compoundList"></div>
  </div>
</div>

<script type="module">
  import init, { SudachiTokenizer } from '../pkg/sudachi_wasm.js';

  await init();

  const statusEl    = document.getElementById('status');
  const inputEl     = document.getElementById('inputText');
  const tokenizeBtn = document.getElementById('tokenizeBtn');
  const compoundsBtn = document.getElementById('compoundsBtn');
  const dictInput   = document.getElementById('dictInput');
  const dictUrlEl   = document.getElementById('dictUrl');
  const loadUrlBtn  = document.getElementById('loadUrlBtn');
  const tokenBody   = document.getElementById('tokenBody');
  const compoundList = document.getElementById('compoundList');
  const tabsEl      = document.getElementById('tabs');

  let tokenizer = null;

  function setStatus(msg, type = 'info') {
    statusEl.textContent = msg;
    statusEl.className = `status ${type}`;
  }

  async function loadDict(bytes) {
    setStatus('Loading dictionary...');
    try {
      tokenizer = new SudachiTokenizer(bytes);
      setStatus(`Dictionary loaded (${(bytes.length / 1_000_000).toFixed(1)} MB). Ready.`, 'success');
      inputEl.disabled = false;
      tokenizeBtn.disabled = false;
      compoundsBtn.disabled = false;
    } catch (e) {
      setStatus(`Failed to load dictionary: ${e.message}`, 'error');
    }
  }

  // Load from file picker
  dictInput.addEventListener('change', async () => {
    const file = dictInput.files[0];
    if (!file) return;
    const bytes = new Uint8Array(await file.arrayBuffer());
    await loadDict(bytes);
  });

  // Load from URL
  loadUrlBtn.addEventListener('click', async () => {
    const url = dictUrlEl.value.trim();
    if (!url) return;
    setStatus(`Fetching ${url}...`);
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const bytes = new Uint8Array(await res.arrayBuffer());
      await loadDict(bytes);
    } catch (e) {
      setStatus(`Fetch failed: ${e.message}`, 'error');
    }
  });

  // Tokenize
  tokenizeBtn.addEventListener('click', () => {
    const text = inputEl.value.trim();
    if (!text || !tokenizer) return;

    let tokens;
    try {
      tokens = tokenizer.tokenize(text);
    } catch (e) {
      setStatus(`Tokenization failed: ${e.message}`, 'error');
      return;
    }

    tokenBody.innerHTML = '';
    for (const tok of tokens) {
      const tr = document.createElement('tr');
      const colBadge = tok.isColocated
        ? '<span class="colocated-badge">colocated</span>' : '';
      tr.innerHTML = `
        <td><span class="surface">${tok.surface}</span>${colBadge}</td>
        <td class="bytes">[${tok.byteStart}..${tok.byteEnd}]</td>
      `;
      tokenBody.appendChild(tr);
    }

    showPanel('tokens');
    tabsEl.style.display = 'flex';
  });

  // Detect compounds
  compoundsBtn.addEventListener('click', () => {
    const text = inputEl.value.trim();
    if (!text || !tokenizer) return;

    let compounds;
    try {
      compounds = tokenizer.detectCompounds(text);
    } catch (e) {
      setStatus(`Compound detection failed: ${e.message}`, 'error');
      return;
    }

    compoundList.innerHTML = '';
    if (compounds.length === 0) {
      compoundList.innerHTML = '<p class="empty">No compound words found.</p>';
    } else {
      for (const c of compounds) {
        const card = document.createElement('div');
        card.className = 'compound-card';
        const comps = c.components.map(s => `<span class="component">${s}</span>`).join('');
        card.innerHTML = `<div class="compound-surface">${c.surface}</div>
          <div class="components">${comps}</div>`;
        compoundList.appendChild(card);
      }
    }

    showPanel('compounds');
    tabsEl.style.display = 'flex';
  });

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => showPanel(tab.dataset.panel));
  });

  function showPanel(name) {
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.dataset.panel === name));
    document.querySelectorAll('.panel').forEach(p =>
      p.classList.toggle('active', p.id === name));
  }
</script>
</body>
</html>
