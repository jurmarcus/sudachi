[workspace]
resolver = "2"
members = [
    "crates/sudachi-search",
    "crates/sudachi-tantivy",
    "crates/sudachi-sqlite",
]
# Excluded from root workspace:
# - sudachi-postgres: pgrx extension with its own nested workspace
# - sudachi-wasm: wasm-pack build, not standard cargo; resource paths assume outer wrapper layout
exclude = [
    "crates/sudachi-postgres",
    "crates/sudachi-wasm",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/jurmarcus/sudachi"

[workspace.dependencies]
sudachi = { git = "https://github.com/WorksApplications/sudachi.rs", branch = "develop" }
sudachi-search = { path = "crates/sudachi-search" }
sudachi-tantivy = { path = "crates/sudachi-tantivy" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
